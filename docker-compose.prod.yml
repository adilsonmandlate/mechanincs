services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile.prod
    container_name: mechanics-api
    expose:
      - '3333'
    env_file:
      - ./api/.env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks:
      - mechanics-network
      - acd-network

  redis:
    image: redis:7-alpine
    container_name: mechanics-redis
    restart: unless-stopped
    networks:
      - mechanics-network
    volumes:
      - redis_mechanics_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgis/postgis:17-3.4
    container_name: mechanics-postgres
    env_file:
      - ./api/.env
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - postgres_mechanics_data:/var/lib/postgresql/data
    networks:
      - mechanics-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_mechanics_data:
  redis_mechanics_data:

networks:
  mechanics-network:
    driver: bridge
  acd-network:
    external: true
